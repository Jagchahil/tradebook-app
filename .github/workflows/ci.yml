# Lekhio web CI. Runs on every push so a red change never reaches production
# unnoticed. Vercel still builds and deploys; this is the tripwire that fails
# fast and visibly on types, tests, or the build.
name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Tax exam suite
        run: node test/exams/run-exams.mjs
      - name: HMRC foundation suite
        run: node test/hmrc/run-hmrc-test.mjs
      - name: WhatsApp intent suite
        run: node test/waintents.test.mjs
      - name: Logic tests
        run: node test/logic.test.js
      - name: Build
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
